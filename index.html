<!DOCTYPE html>
<html>
<head>
  <title>My Page</title>
  <style>
  .gridBox{
    display:grid;
    grid-template-columns: repeat(3,50px);
    grid-template-rows:repeat(3,50px);
    gap:5px;
  }
  .box{
    background-color: gray;
    border:2px solid black;
    display:flex;
    cursor:pointer;
  }
  </style>
</head>
<body>
  <div class='gridBox'>
    <div class='box'></div>
    <div class='box'></div>
    <div class='box'></div>
    <div class='box'></div>
    <div class='box'></div>
    <div class='box'></div>
    <div class='box'></div>
    <div class='box'></div>
    <div class='box'></div>
  </div>
  <p id='para'></p>
  <script src='script.js'></script>
</body>
</html>
